<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .font { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 36px; font-weight: 900; fill: #88CE02; }
    .letter { opacity: 0; animation: flyIn 5s infinite cubic-bezier(0.16, 1, 0.3, 1); }
    
    .g { animation-name: flyG; }
    .s { animation-name: flyS; }
    .a { animation-name: flyA; }
    .p { animation-name: flyP; }

    @keyframes flyG { 0%, 5% { opacity: 0; transform: translateX(-30px); } 15%, 85% { opacity: 1; transform: translateX(0); } 90%, 100% { opacity: 0; transform: translateY(-10px); } }
    @keyframes flyS { 0%, 10% { opacity: 0; transform: translateY(-30px); } 20%, 85% { opacity: 1; transform: translateY(0); } 90%, 100% { opacity: 0; transform: translateY(-10px); } }
    @keyframes flyA { 0%, 15% { opacity: 0; transform: translateY(30px); } 25%, 85% { opacity: 1; transform: translateY(0); } 90%, 100% { opacity: 0; transform: translateY(-10px); } }
    @keyframes flyP { 0%, 20% { opacity: 0; transform: translateX(30px); } 30%, 85% { opacity: 1; transform: translateX(0); } 90%, 100% { opacity: 0; transform: translateY(-10px); } }
  </style>
  
  <g class="letter g"><text x="5" y="62" class="font">G</text></g>
  <g class="letter s"><text x="31" y="62" class="font">S</text></g>
  <g class="letter a"><text x="55" y="62" class="font">A</text></g>
  <g class="letter p"><text x="79" y="62" class="font">P</text></g>
</svg>
