<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .blue-half { fill: #3776AB; opacity: 0; animation: slitherBlue 5s infinite cubic-bezier(0.16, 1, 0.3, 1); transform-origin: 50px 50px; }
    .yellow-half { fill: #FFD43B; opacity: 0; animation: slitherYellow 5s infinite cubic-bezier(0.16, 1, 0.3, 1); transform-origin: 50px 50px; }
    .eye { fill: #ffffff; opacity: 0; animation: blink 5s infinite; }
    .e1 { animation-delay: 0.8s; } 
    .e2 { animation-delay: 0.9s; }
    
    /* Blue slides in from top-left */
    @keyframes slitherBlue { 
      0%, 10% { transform: translate(-15px, -15px); opacity: 0; } 
      25%, 85% { transform: translate(0, 0); opacity: 1; } 
      90%, 100% { transform: translate(0, 0); opacity: 0; } 
    }
    
    /* Yellow slides in from bottom-right (handled via rotation + translation) */
    @keyframes slitherYellow { 
      0%, 10% { transform: translate(15px, 15px) rotate(180deg); opacity: 0; } 
      25%, 85% { transform: translate(0, 0) rotate(180deg); opacity: 1; } 
      90%, 100% { transform: translate(0, 0) rotate(180deg); opacity: 0; } 
    }
    
    @keyframes blink { 0%, 10% { opacity: 0; } 15%, 85% { opacity: 1; } 90%, 100% { opacity: 0; } }
  </style>
  
  <!-- Top/Blue Snake -->
  <g class="blue-half">
    <path d="M 50 14 C 34 14, 32 22, 32 22 L 32 32 L 52 32 L 52 35 L 32 35 C 20 35, 17 44, 17 52 C 17 62, 21 67, 29 67 L 34 67 L 34 57 C 34 46, 43 40, 54 40 L 63 40 C 70 40, 74 36, 74 29 L 74 23 C 74 16, 66 14, 50 14 Z" />
    <circle cx="40" cy="23" r="3.5" class="eye e1" />
  </g>
  
  <!-- Bottom/Yellow Snake -->
  <g class="yellow-half">
    <path d="M 50 14 C 34 14, 32 22, 32 22 L 32 32 L 52 32 L 52 35 L 32 35 C 20 35, 17 44, 17 52 C 17 62, 21 67, 29 67 L 34 67 L 34 57 C 34 46, 43 40, 54 40 L 63 40 C 70 40, 74 36, 74 29 L 74 23 C 74 16, 66 14, 50 14 Z" />
    <circle cx="40" cy="23" r="3.5" class="eye e2" />
  </g>
</svg>
