<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .circle-draw {
      fill: transparent; stroke: #009688; stroke-width: 3;
      stroke-dasharray: 300; stroke-dashoffset: 300;
      animation: drawCircle 5s infinite cubic-bezier(0.64, 0, 0.78, 0);
    }
    .bolt-strike {
      fill: #ffffff; opacity: 0; transform-origin: 50% 50%;
      animation: strike 5s infinite cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    @keyframes drawCircle { 
      0%, 5% { stroke-dashoffset: 300; fill: transparent; stroke-width: 3; opacity: 1; } 
      20% { stroke-dashoffset: 0; fill: transparent; stroke-width: 3; opacity: 1; } 
      25%, 85% { stroke-dashoffset: 0; fill: #009688; stroke-width: 0; opacity: 1; } 
      90%, 100% { opacity: 0; }
    }
    @keyframes strike { 
      0%, 25% { opacity: 0; transform: scale(2.5) translateY(-20px); } 
      32%, 85% { opacity: 1; transform: scale(1) translateY(0); } 
      90%, 100% { opacity: 0; }
    }
  </style>
  
  <circle cx="50" cy="50" r="45" class="circle-draw" />
  <path d="M 55 20 L 32 55 L 50 55 L 45 80 L 72 45 L 55 45 Z" class="bolt-strike" />
</svg>
