<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .bg { fill: #3178C6; transform-origin: 50px 50px; animation: popBg 5s infinite cubic-bezier(0.16, 1, 0.3, 1); opacity: 0; }
    .font { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 42px; font-weight: bold; fill: #ffffff; }
    .t { opacity: 0; animation: slideT 5s infinite cubic-bezier(0.16, 1, 0.3, 1); }
    .s { opacity: 0; animation: slideS 5s infinite cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes popBg { 0%, 5% { transform: scale(0); opacity: 0; } 15%, 85% { transform: scale(1); opacity: 1; } 90%, 100% { transform: scale(1.1); opacity: 0; } }
    @keyframes slideT { 0%, 20% { opacity: 0; transform: translateY(-20px); } 30%, 85% { opacity: 1; transform: translateY(0); } 90%, 100% { opacity: 0; } }
    @keyframes slideS { 0%, 25% { opacity: 0; transform: translateX(20px); } 35%, 85% { opacity: 1; transform: translateX(0); } 90%, 100% { opacity: 0; } }
  </style>
  <rect x="15" y="15" width="70" height="70" rx="6" class="bg" />
  <g class="t"><text x="25" y="66" class="font">T</text></g>
  <g class="s"><text x="49" y="66" class="font">S</text></g>
</svg>
