<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="2" fill="#000" fill-opacity="0.3"/>
      <rect y="2" width="4" height="2" fill="#000" fill-opacity="0.1"/>
    </pattern>
  </defs>

  <style>
    .bg { fill: #041204; }
    
    .text { 
      font-family: 'Courier New', Courier, monospace; 
      font-size: 16px; 
      font-weight: 600;
      fill: #1aff80; 
      filter: url(#glow);
    }
    
    .cursor { 
      animation: blink 1s step-end infinite; 
    }
    
    /* Reveal animations using opacity steps to mimic terminal loading */
    .line { opacity: 0; }
    .l1 { animation: show 0.1s forwards 0.5s; }
    .l2 { animation: show 0.1s forwards 0.7s; }
    .l3 { animation: show 0.1s forwards 0.9s; }
    
    .l4 { animation: show 0.1s forwards 1.8s; }
    
    .l5 { animation: show 0.1s forwards 2.8s; }
    .l6 { animation: show 0.1s forwards 3.4s; }
    .l7 { animation: show 0.1s forwards 4.2s; }

    @keyframes show { 
      to { opacity: 1; } 
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>

  <rect class="bg" width="100%" height="100%" rx="8" />
  
  <g transform="translate(30, 45)">
    <text class="text line l1" y="0">ROBCO INDUSTRIES UNIFIED OPERATING SYSTEM</text>
    <text class="text line l2" y="25">COPYRIGHT 2075-2077 ROBCO INDUSTRIES</text>
    <text class="text line l3" y="50">-Server 1-</text>
    
    <text class="text line l4" y="110">Welcome, R. AKULWAR.</text>
    
    <text class="text line l5" y="160">> INIT_FRONTEND_PROTOCOL........ OK</text>
    <text class="text line l6" y="185">> MOUNTING /PORTFOLIO/DATA...... OK</text>
    <text class="text line l7" y="210">> EXECUTE DESIGN_FORWARD.EXE<tspan class="cursor">_</tspan></text>
  </g>

  <rect width="100%" height="100%" fill="url(#scanlines)" rx="8" pointer-events="none" />
  
  <rect width="100%" height="100%" fill="none" stroke="#0a2a0a" stroke-width="6" rx="8" pointer-events="none" />
</svg>
