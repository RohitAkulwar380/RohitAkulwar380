<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .line { fill: none; stroke: #EA4B71; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 120; stroke-dashoffset: 120; animation: drawLine 5s infinite cubic-bezier(0.64, 0, 0.78, 0); }
    .node { fill: #ffffff; stroke: #EA4B71; stroke-width: 8; transform-origin: center; animation: popNode 5s infinite cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; }
    
    /* Set origins so nodes pop from their own centers */
    .n1 { transform-origin: 18px 50px; }
    .n2 { transform-origin: 45px 50px; }
    .n3 { transform-origin: 80px 25px; }
    .n4 { transform-origin: 80px 75px; }

    @keyframes drawLine { 
      0%, 5% { stroke-dashoffset: 120; opacity: 1; } 
      25%, 85% { stroke-dashoffset: 0; opacity: 1; } 
      90%, 100% { opacity: 0; } 
    }
    @keyframes popNode { 
      0%, 20% { transform: scale(0); opacity: 0; } 
      30%, 85% { transform: scale(1); opacity: 1; } 
      90%, 100% { transform: scale(1); opacity: 0; } 
    }
  </style>

  <g>
    <path d="M 20 50 L 45 50 C 55 50, 55 25, 65 25 L 80 25" class="line" />
    <path d="M 45 50 C 55 50, 55 75, 65 75 L 80 75" class="line" />
    
    <circle cx="18" cy="50" r="10" class="node n1" />
    <circle cx="45" cy="50" r="10" class="node n2" />
    <circle cx="80" cy="25" r="10" class="node n3" />
    <circle cx="80" cy="75" r="10" class="node n4" />
  </g>
</svg>
