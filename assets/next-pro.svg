<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .bg { fill: #ffffff; stroke: #111111; stroke-width: 2; transform-origin: center; animation: pulse 5s infinite; }
    .line { stroke: #111111; stroke-width: 8; fill: none; stroke-dasharray: 100; stroke-dashoffset: 100; animation: draw 5s infinite cubic-bezier(0.64, 0, 0.78, 0); }
    .l1 { animation-delay: 0.1s; } .l2 { animation-delay: 0.3s; stroke-width: 7; } .l3 { animation-delay: 0.5s; }
    @keyframes draw { 0%, 10% { stroke-dashoffset: 100; opacity: 1; } 30%, 85% { stroke-dashoffset: 0; opacity: 1; } 90%, 100% { opacity: 0; } }
    @keyframes pulse { 0%, 10% { opacity: 0; transform: scale(0.9); } 20%, 85% { opacity: 1; transform: scale(1); } 90%, 100% { opacity: 0; transform: scale(0.9); } }
  </style>
  <circle cx="50" cy="50" r="45" class="bg" />
  <path d="M 35 68 L 35 32" class="line l1" />
  <path d="M 35 32 L 65 68" class="line l2" />
  <path d="M 65 68 L 65 32" class="line l3" />
</svg>
