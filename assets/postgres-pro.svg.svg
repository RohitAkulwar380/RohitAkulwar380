<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .draw {
      fill: transparent; stroke: #336791; stroke-width: 2;
      stroke-dasharray: 400; stroke-dashoffset: 400;
      animation: drawPostgres 5s infinite cubic-bezier(0.64, 0, 0.78, 0);
    }
    @keyframes drawPostgres {
      0%, 5% { stroke-dashoffset: 400; fill: transparent; stroke-width: 2; opacity: 1;}
      25% { stroke-dashoffset: 0; fill: transparent; stroke-width: 2;}
      35%, 85% { fill: #336791; stroke-width: 0; opacity: 1;}
      90%, 100% { opacity: 0; fill: #336791; }
    }
  </style>
  
  <g>
