    <path d="M 40 40 L 60 40 L 60 75 C 60 85 55 95 50 95 C 45 95 40 85 40 75 Z" class="draw" />
    <path d="M 30 75 C 35 75 40 70 40 65 L 30 65 Z" class="draw" />
    <path d="M 70 75 C 65 75 60 70 60 65 L 70 65 Z" class="draw" />
  </g>
</svg>
