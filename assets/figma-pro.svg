<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .shape { transform-origin: center; opacity: 0; animation: pop 5s infinite cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .s1 { animation-delay: 0s; fill: #F24E1E; transform-origin: 38px 25px; } 
    .s2 { animation-delay: 0.1s; fill: #1ABCFE; transform-origin: 62px 25px; } 
    .s3 { animation-delay: 0.2s; fill: #A259FF; transform-origin: 38px 50px; } 
    .s4 { animation-delay: 0.3s; fill: #0ACF83; transform-origin: 62px 50px; } 
    .s5 { animation-delay: 0.4s; fill: #FF7262; transform-origin: 38px 75px; } 
    @keyframes pop { 0%, 10% { transform: scale(0) translateY(-20px); opacity: 0; } 25%, 85% { transform: scale(1) translateY(0); opacity: 1; } 90%, 100% { transform: scale(0); opacity: 0; } }
  </style>
  <path d="M 50 13 v 24 h -12 a 12 12 0 0 1 0 -24 h 12 z" class="shape s1" />
  <circle cx="62" cy="25" r="12" class="shape s2" />
  <path d="M 50 37 v 24 h -12 a 12 12 0 0 1 0 -24 h 12 z" class="shape s3" />
  <circle cx="62" cy="49" r="12" class="shape s4" />
  <path d="M 50 61 v 12 a 12 12 0 0 1 -24 0 a 12 12 0 0 1 12 -12 h 12 z" class="shape s5" />
</svg>
